name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install E2E dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run E2E tests
        env:
          ARDUR_AI_ENABLED: '0'
          ARDUR_AI_PROVIDER: deterministic
        run: npm test
