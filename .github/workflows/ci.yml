name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install E2E dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit E2E tests (in-process library APIs)
        env:
          ARDUR_AI_ENABLED: '0'
          ARDUR_AI_PROVIDER: deterministic
          ARDUR_AI_MAX_GENERATIONS: '0'
        run: npm run test:unit

      - name: Run pipeline E2E tests (real CLI-backed runners)
        env:
          ARDUR_AI_ENABLED: '0'
          ARDUR_AI_PROVIDER: deterministic
          ARDUR_AI_MAX_GENERATIONS: '0'
        run: npm run test:pipeline
